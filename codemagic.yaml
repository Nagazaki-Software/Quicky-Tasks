workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version
          xcodebuild -version
          ruby -v || true
          pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          # Garante que o Generated.xcconfig existe para o Podfile carregar o podhelper
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Instalar CocoaPods e atualizar repos
        script: |
          set -euo pipefail
          # Usa CocoaPods do ambiente (instalar só se faltar)
          gem list -i cocoapods || gem install cocoapods -N --user-install
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          pod --version

          cd ios
          # Garante o CDN no topo do Podfile (idempotente)
          if ! grep -q "^source 'https://cdn.cocoapods.org/'" Podfile; then
            sed -i.bak "1isource 'https://cdn.cocoapods.org/'" Podfile
          fi

          # Atualiza specs e instala (com retry leve)
          pod repo update
          (pod install --repo-update) || (echo "retry pod install..." && sleep 5 && pod install --repo-update)
          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
