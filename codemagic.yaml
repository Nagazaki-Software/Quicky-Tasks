workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods
    scripts:
      # 0) Info de ambiente (útil pra debug)
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version
          xcodebuild -version
          ruby -v || true
          pod --version || true

      # 1) Sempre gerar artefatos do Flutter antes de mexer com CocoaPods
      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          # Garante que o Generated.xcconfig foi criado
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      # 2) CocoaPods com repositório CDN atualizado
      - name: Instalar CocoaPods e atualizar repos
        script: |
          set -euo pipefail
          # Instala user-local caso a imagem precise
          gem install cocoapods -N --user-install || true
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          pod --version

          cd ios

          # Garante o CDN no topo do Podfile (idempotente)
          if ! grep -q "^source 'https://cdn.cocoapods.org/'" Podfile; then
            sed -i.bak "1isource 'https://cdn.cocoapods.org/'" Podfile
          fi

          pod repo update

          # Retry leve em caso de flutuação de rede/CDN
          (pod install --repo-update) || (echo "pod install falhou, tentando novamente..." && sleep 5 && pod install --repo-update)

          cd ..

      # 3) Build iOS (sem codesign)
      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
