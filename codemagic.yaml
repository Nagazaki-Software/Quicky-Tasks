workflows:
  ios-release:
    name: iOS Release (App Store Connect)
    environment:
      flutter: stable
      xcode: latest
      vars:
        EXPORT_PLIST_PATH: ios/ExportOptions.plist
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          ruby -v || true; pod --version || true

      - name: Install CocoaPods 1.16.2 (persist PATH)
        script: |
          set -euo pipefail
          gem uninstall cocoapods -aIx || true
          gem install cocoapods -v 1.16.2 -N --user-install
          echo "export GEM_BIN=$(ruby -e 'print Gem.user_dir')/bin" >> $CM_ENV
          echo 'export PATH="$GEM_BIN:$PATH"' >> $CM_ENV
          source $CM_ENV
          pod --version

      - name: Flutter clean, precache & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter precache --ios
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Escrever/Atualizar Podfile (com Runner + ImageNotification)
        script: |
          set -euo pipefail
          mkdir -p ios
          cat > ios/Podfile <<'PODFILE'
          source 'https://cdn.cocoapods.org/'
          platform :ios, '14.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          install! 'cocoapods', :warn_for_unused_master_specs_repo => false

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcconfig = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "Generated.xcconfig não encontrado. Rode `flutter pub get`." unless File.exist?(generated_xcconfig)
            File.foreach(generated_xcconfig) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/)
              return m[1].strip if m
            end
            raise "FLUTTER_ROOT não encontrado no Generated.xcconfig."
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))
          flutter_ios_podfile_setup

          # ===== App principal =====
          target 'Runner' do
            use_frameworks! :linkage => :static
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            pod 'Braintree/Core',          '~> 6.36'
            pod 'Braintree/Card',          '~> 6.36'
            pod 'Braintree/ThreeDSecure',  '~> 6.36'
            pod 'Braintree/DataCollector', '~> 6.36'
            pod 'Braintree/ApplePay',      '~> 6.36'
            # pod 'Braintree/PayPal',      '~> 6.36'
            # pod 'Braintree/Venmo',       '~> 6.36'
          end

          # ===== Extensão de Notificação =====
          target 'ImageNotification' do
            inherit! :search_paths
            use_frameworks! :linkage => :static
            pod 'Firebase/Messaging'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |t|
              flutter_additional_ios_build_settings(t)
              t.build_configurations.each do |c|
                c.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
                c.build_settings.delete('ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES')
              end
            end
          end
          PODFILE

      - name: Patch xcconfigs do Flutter para herdar Pods
        script: |
          set -euo pipefail
          mkdir -p ios/Flutter
          for mode in Debug Profile Release; do
            f="ios/Flutter/${mode}.xcconfig"; test -f "$f" || touch "$f"
          done
          prepend_once () { local file="$1"; local line="$2"; grep -Fq "$line" "$file" || { tmp="$(mktemp)"; { echo "$line"; cat "$file"; } > "$tmp"; mv "$tmp" "$file"; }; }
          prepend_once ios/Flutter/Debug.xcconfig   '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig"'
          prepend_once ios/Flutter/Profile.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"'
          prepend_once ios/Flutter/Release.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig"'
          for f in ios/Flutter/*.xcconfig; do echo "---- $f ----"; sed -n '1,3p' "$f" || true; done

      - name: Pod install (clean)
        script: |
          set -euo pipefail
          source $CM_ENV
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod repo update
          pod _1.16.2_ install
          cd ..

      # ====== CODE SIGNING ======
      - name: Instalar certificado (.p12) no keychain
        script: |
          set -euo pipefail
      
          # Falha com mensagem amigável se faltar variável
          : "${P12_BASE64:?Defina a secret P12_BASE64 com o .p12 em base64}"
          : "${P12_PASSWORD:?Defina a secret P12_PASSWORD com a senha do .p12}"

          KEYCHAIN_DIR="$HOME/Library/codemagic-cli-tools/keychains"
          KEYCHAIN_PATH="$KEYCHAIN_DIR/${CM_BUILD_ID:-cm}.keychain-db"
      
          mkdir -p "$KEYCHAIN_DIR"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 0 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
      
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f cert.p12
      
          # Dá permissão pro codesign usar a chave sem prompt
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH" >/dev/null


      - name: Instalar Provisioning Profiles (Runner + ImageNotification)
        script: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PP_APP_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/Runner_AppStore.mobileprovision"
          echo "$PP_EXT_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/ImageNotification_AppStore.mobileprovision"
          ls -lah "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: ExportOptions.plist (App Store)
        script: |
          set -euo pipefail
          cat > "$EXPORT_PLIST_PATH" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>uploadBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          PLIST

      - name: Build IPA assinado (Release)
        script: |
          set -euo pipefail
          # Gera .xcarchive e exporta IPA assinado com os perfis instalados
          flutter build ipa --release --export-options-plist="$EXPORT_PLIST_PATH"

      # ====== PUBLISH to TestFlight ======
      - name: Upload para App Store Connect (TestFlight)
        script: |
          set -euo pipefail
          IPA_PATH=$(ls -1 build/ios/ipa/*.ipa | head -n1)
          test -f "$IPA_PATH" || (echo "IPA não encontrado!" && exit 1)
          echo "$ASC_API_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "Upload disparado: $IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
