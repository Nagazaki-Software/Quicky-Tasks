workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          ruby -v || true; pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

           - name: Escrever Podfile (robusto)
        script: |
          set -euo pipefail
          cat > ios/Podfile <<'PODFILE'
          # Podfile gerado para Flutter + Braintree (CocoaPods)
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          # Lê FLUTTER_ROOT do Generated.xcconfig (padrão do template Flutter)
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "Generated.xcconfig deve existir. Rode `flutter pub get` primeiro."
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT não encontrado em Generated.xcconfig"
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))
          flutter_ios_podfile_setup

          target 'Runner' do
            # Linkagem estática = menos dor de cabeça de linkagem
            use_frameworks! :linkage => :static

            # Plugins do Flutter
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            # 👉 Braintree via CocoaPods (NÃO via :git). Linha 6.x
            pod 'Braintree',               '~> 6.36'
            pod 'Braintree/Card',          '~> 6.36'
            pod 'Braintree/ThreeDSecure',  '~> 6.36'
            pod 'Braintree/DataCollector', '~> 6.36'
          end

          # Se tiver targets extras, descomenta/ajusta:
          # target 'ImageNotification' do
          #   use_frameworks! :linkage => :static
          #   pod 'Firebase/Messaging'
          # end

          # ===== Wrapper à prova de versões de Flutter/CocoaPods =====
          def _call_flutter_build_settings_safely(installer)
            return unless self.respond_to?(:flutter_additional_ios_build_settings)
            begin
              arity = method(:flutter_additional_ios_build_settings).arity
            rescue
              arity = -1
            end

            # 1) Preferir TARGET por ser o mais comum nas versões recentes
            if arity == 1
              installer.pods_project.targets.each do |t|
                begin
                  flutter_additional_ios_build_settings(t)
                rescue NoMethodError, ArgumentError
                  # ignora e tenta as outras variantes
                end
              end
              return
            end

            # 2) Sem args (raro, mas vai que)
            if arity == 0
              begin
                flutter_additional_ios_build_settings
                return
              rescue NoMethodError, ArgumentError
              end
            end

            # 3) Installer (padrão antigo)
            begin
              flutter_additional_ios_build_settings(installer)
            rescue NoMethodError, ArgumentError
              # Último fallback: nada — não deixamos o hook quebrar.
            end
          end
          # ===========================================================

          post_install do |installer|
            # Usa o wrapper seguro (NÃO chamamos mais direto o helper)
            _call_flutter_build_settings_safely(installer)

            # Garante iOS mínimo e Swift 5.0 em todos os pods
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['SWIFT_VERSION'] = '5.0'
              end
            end
          end
          PODFILE

          echo "== Podfile final =="
          nl -ba ios/Podfile | sed -n '1,120p'

      - name: Install CocoaPods
        script: |
          set -euo pipefail

          # (1) Garante que o Generated.xcconfig exista antes do pod install
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig ainda não existe!"; exit 1)

          # (2) Fixar CocoaPods estável e chamar explicitamente essa versão
          gem uninstall cocoapods -aIx || true
          gem install cocoapods -v 1.15.2 -N --user-install

          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"

          echo "CocoaPods version (esperado 1.15.2):"
          pod --version

          cd ios
          rm -f Podfile.lock
          rm -rf Pods

          pod _1.15.2_ repo update
          pod _1.15.2_ deintegrate || true
          pod _1.15.2_ install --repo-update
          cd ..



       - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          # 🔑 PASSO CRÍTICO: reexporta o GEM_BIN neste passo também!
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          echo "CocoaPods em PATH durante o build:"
          which pod || true
          pod --version || true

          # Só por garantia, deps Flutter ok
          flutter pub get

          # Build
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
