workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Limpar e atualizar CocoaPods
        script: |
          #!/bin/bash
          set -euo pipefail
          gem install cocoapods -N || true
          rm -rf "$HOME/Library/Caches/CocoaPods" "$HOME/.cocoapods/repos" || true
          pod setup
          cd ios
          # garante que o source CDN está no topo
          if ! grep -q 'source.*cdn.cocoapods.org' Podfile; then
            sed -i.bak '1isource "https://cdn.cocoapods.org/"' Podfile
          fi
          pod deintegrate || true
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update --verbose
          cd ..
      - name: Flutter clean & get
        script: |
          flutter clean
          flutter pub get
      - name: Build iOS (release, no codesign)
        script: |
          flutter build ios --release --no-codesign
