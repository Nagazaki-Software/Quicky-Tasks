workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version
          xcodebuild -version
          ruby -v || true
          pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          # Garante que o Generated.xcconfig existe para o Podfile carregar o podhelper
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Patch Podfile (use_frameworks! + Braintree)
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"

          # 1) Garante a fonte CDN no topo
          if ! grep -q "^source 'https://cdn.cocoapods.org/'" "$PODFILE"; then
            sed -i.bak "1isource 'https://cdn.cocoapods.org/'" "$PODFILE"
          fi

          # 2) Garante platform iOS 15.0
          if ! grep -q "^platform :ios, '15.0'" "$PODFILE"; then
            # se já existir platform :ios, substitui; senão, insere após a primeira linha 'source'
            if grep -q "^platform :ios" "$PODFILE"; then
              sed -i.bak "s/^platform :ios.*/platform :ios, '15.0'/" "$PODFILE"
            else
              awk '
                NR==1 { print; print "platform :ios, '\''15.0'\''"; next }
                { print }
              ' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            fi
          fi

          # 3) Insere use_frameworks! dentro do target Runner (se não tiver)
          if ! awk '/target.*Runner/{inrunner=1} inrunner && /use_frameworks!/{found=1} /end/{if(inrunner){inrunner=0}} END{exit !found}' "$PODFILE"; then
            awk '
              /target[[:space:]]+'\''Runner'\''[[:space:]]+do/ { print; print "  use_frameworks!"; next }
              { print }
            ' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          fi

          # 4) Garante o umbrella pod Braintree (sem version pin)
          if ! awk '/target.*Runner/{inrunner=1} inrunner && /pod[[:space:]]+'\''Braintree'\''/{found=1} /end/{if(inrunner){inrunner=0}} END{exit !found}' "$PODFILE"; then
            awk '
              /target[[:space:]]+'\''Runner'\''[[:space:]]+do/ { print; insert=1; print; next }
              insert==1 && /^  flutter_install_all_ios_pods/ { print "  pod '\''Braintree'\''"; insert=0; print; next }
              { print }
            ' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          fi

          echo "== Podfile final =="
          cat "$PODFILE"

      - name: Instalar CocoaPods e atualizar repos
        script: |
          set -euo pipefail
          # Usa CocoaPods do ambiente (instalar só se faltar)
          gem list -i cocoapods || gem install cocoapods -N --user-install
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          pod --version

          cd ios
          pod repo update
          (pod install --repo-update) || (echo "retry pod install..." && sleep 5 && pod install --repo-update)
          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
