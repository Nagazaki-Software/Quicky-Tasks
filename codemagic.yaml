workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version
          xcodebuild -version
          ruby -v || true
          pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      # 🔧 PATCH: injeta as dependências do Braintree no podspec do plugin
      - name: Patch braintree_native_ui.podspec
        script: |
          set -euo pipefail
          PODSPEC="ios/.symlinks/plugins/braintree_native_ui/ios/braintree_native_ui.podspec"
          if [ ! -f "$PODSPEC" ]; then
            echo "Podspec do plugin não encontrado em $PODSPEC"; ls -la ios/.symlinks/plugins || true; exit 1
          fi

          echo "Antes do patch:"
          grep -n "s.dependency" "$PODSPEC" || true

          ruby - "$PODSPEC" <<'RB'
            path = ARGV[0]
            txt  = File.read(path)
            # Garante o umbrella pod 'Braintree' (que expõe BraintreeCore/Card/ThreeDSecure/DataCollector)
            need = !txt.include?("s.dependency 'Braintree'")
            if need
              txt.gsub!(/(Pod::Spec\.new do \|s\|.*?end)m/) do |spec|
                spec.sub(/end\s*\z/m, "  s.dependency 'Braintree', '~> 5.31'\nend")
              end
              File.write(path, txt)
              puts ">> Adicionado: s.dependency 'Braintree', '~> 5.31'"
            else
              puts ">> Já possui dependência 'Braintree' no podspec"
            end
          RB

          echo "Depois do patch:"
          grep -n "s.dependency" "$PODSPEC" || true

      - name: Instalar CocoaPods e atualizar repos
        script: |
          set -euo pipefail
          gem install cocoapods -N --user-install || true
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          pod --version

          cd ios

          # Garante CDN no topo do Podfile
          if ! grep -q "^source 'https://cdn.cocoapods.org/'" Podfile; then
            sed -i.bak "1isource 'https://cdn.cocoapods.org/'" Podfile
          fi

          # Garante use_frameworks! (dinâmico ajuda módulos Swift)
          if ! grep -q "^use_frameworks!" Podfile; then
            # insere dentro do target 'Runner' se não existir
            awk '
              BEGIN{inrunner=0}
              /target.*Runner/ {print; inrunner=1; next}
              inrunner && /^\s*do\s*$/ {print; print "  use_frameworks!"; next}
              /end/ && inrunner {inrunner=0; print; next}
              {print}
            ' Podfile > Podfile.tmp && mv Podfile.tmp Podfile
          fi

          # Atualiza e instala (com retry leve)
          pod repo update
          (pod install --repo-update) || (echo "retry pod install..." && sleep 5 && pod install --repo-update)

          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
