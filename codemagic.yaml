workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        EXPORT_PLIST_PATH: "ios/Runner/ExportOptions.plist"
    scripts:
      - name: Limpar cache Flutter
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          pod cache clean --all || true

      - name: Instalar dependências
        script: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Diagnóstico bundles no archive
        script: |
          echo "📦 Verificando bundles no archive"
          mkdir -p build/ios/archive   # evita erro "No such file or directory"
          find build/ios/archive || echo "Nenhum bundle gerado ainda"

      - name: Build IPA assinado (Release)
        script: |
          set -euo pipefail
          echo "export FLUTTER_BUILD_NUMBER=$(date +%s)" >> $CM_ENV
          source $CM_ENV

          LOG_DIR="build/logs"
          mkdir -p "$LOG_DIR"
          BUILD_LOG="$LOG_DIR/flutter_build_ipa.log"

          set +e
          flutter build ipa --release -v \
            --build-number="$FLUTTER_BUILD_NUMBER" \
            --export-options-plist="$EXPORT_PLIST_PATH" \
            2>&1 | tee "$BUILD_LOG"
          STATUS=${PIPESTATUS[0]}
          set -e

          if [ $STATUS -ne 0 ]; then
            echo ""
            echo "===== RESUMO DE ERROS (com contexto) ====="
            GREP_PAT='error:|fatal error:|Swift( Compiler)? Error|clang: error|ld: |Undefined symbols for architecture|Command .* failed with a nonzero exit code|provision|Code ?sign|codesign|entitlement|ARCHIVE FAILED|No such file or directory|The operation couldn.t be completed'
            FIRST=$(grep -nEi "$GREP_PAT" "$BUILD_LOG" | head -n1 | cut -d: -f1)
            if [ -n "$FIRST" ]; then
              START=$(( FIRST>25 ? FIRST-25 : 1 ))
              END=$(( FIRST+60 ))
              nl -ba "$BUILD_LOG" | sed -n "${START},${END}p"
            else
              echo "(nenhuma linha bateu – imprimindo últimas 400)"
              tail -n 400 "$BUILD_LOG"
            fi

            echo ""
            echo "===== (Últimas 500 linhas) ====="
            tail -n 500 "$BUILD_LOG" || true

            exit $STATUS
          fi

          echo "✅ Build OK. Log completo em: $BUILD_LOG"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/*.log
      - flutter_drive.log
