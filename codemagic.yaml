workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          ruby -v || true; pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Escrever Podfile (limpo, estável, com Braintree 6.x)
        script: |
          set -euo pipefail
          cat > ios/Podfile <<'PODFILE'
          # Podfile gerado para Flutter + Braintree (CocoaPods)
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          # Lê FLUTTER_ROOT do Generated.xcconfig (padrão do template Flutter)
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "Generated.xcconfig deve existir. Rode `flutter pub get` primeiro."
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT não encontrado em Generated.xcconfig"
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))

          flutter_ios_podfile_setup

          target 'Runner' do
            # Braintree funciona bem com linkage estática; reduz conflitos e tempo de linkedição
            use_frameworks! :linkage => :static

            # Instala todos os pods do Flutter (plugins, etc.)
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            # 👉 Braintree via CocoaPods (NÃO via :git). Use a linha 6.x
            # Ajuste o "~> 6.36" se quiser fixar minor/patch diferente.
            pod 'Braintree',                '~> 6.36'
            pod 'Braintree/Card',           '~> 6.36'
            pod 'Braintree/ThreeDSecure',   '~> 6.36'
            pod 'Braintree/DataCollector',  '~> 6.36'
          end

          post_install do |installer|
            flutter_additional_ios_build_settings(installer)
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                # Garante o iOS target coerente mesmo se algum pod for teimoso
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          PODFILE

          echo "== Podfile final =="
          cat ios/Podfile

      - name: Install CocoaPods
        script: |
          set -euo pipefail
          # força versão mais estável com Flutter (evita incompatibilidades do 1.16.x)
          gem list -i cocoapods -v 1.15.2 || gem install cocoapods -v 1.15.2 -N --user-install
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          cd ios
          rm -f Podfile.lock
          rm -rf Pods
          pod repo update
          pod install --repo-update || (echo "retry pod install..." && sleep 5 && pod install --repo-update)
          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
