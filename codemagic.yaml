workflows:
  ios-release:
    name: iOS Release (App Store Connect)
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_BUNDLE_ID: com.nagazakisoftware.quick
        EXT_IMAGE_NOTIFICATION_BUNDLE_ID: com.nagazakisoftware.quick.ImageNotification
        EXT_WIDGET_BUNDLE_ID: com.nagazakisoftware.quick.Quicky-Widget
      groups:
        - appstore_credentials
        - ios_signing_files
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
        - ~/.gem

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          which ruby || true; ruby -v || true
          which pod || true; pod --version || true

      - name: Install CocoaPods 1.16.2 (sem rbenv; persist PATH)
        script: |
          set -euo pipefail
          export GEM_HOME="$HOME/.gem"
          export GEM_BIN="$GEM_HOME/bin"
          export PATH="$GEM_BIN:$PATH"
          /usr/bin/gem install cocoapods -v 1.16.2 -N || true
          echo "export GEM_HOME=$GEM_HOME" >> $CM_ENV
          echo "export GEM_BIN=$GEM_BIN"   >> $CM_ENV
          echo 'export PATH="$GEM_BIN:$PATH"' >> $CM_ENV
          ruby -v
          gem env home
          pod --version

      - name: Flutter clean, precache & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter precache --ios
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Criar SwiftDummy.swift no Runner (ativa pipeline Swift)
        script: |
          set -euo pipefail
          mkdir -p ios/Runner
          SWIFT_FILE="ios/Runner/SwiftDummy.swift"
          if [ ! -f "$SWIFT_FILE" ]; then
          cat > "$SWIFT_FILE" <<'SWIFT'
          import Foundation
          @objc class SwiftDummy: NSObject {}
          SWIFT
            echo "Criado $SWIFT_FILE"
          else
            echo "Já existe $SWIFT_FILE"
          fi

      - name: Escrever/Atualizar Podfile (libs estáticas + modular headers seletivos)
        script: |
          set -euo pipefail
          mkdir -p ios
          cat > ios/Podfile <<'PODFILE'
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          install! 'cocoapods',
            :warn_for_unused_master_specs_repo => false,
            :generate_multiple_pod_projects => false,
            :integrate_targets => true

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcconfig = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "Generated.xcconfig não encontrado. Rode `flutter pub get`." unless File.exist?(generated_xcconfig)
            File.foreach(generated_xcconfig) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/)
              return m[1].strip if m
            end
            raise "FLUTTER_ROOT não encontrado no Generated.xcconfig."
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))
          flutter_ios_podfile_setup

          # ⚠️ NÃO usar global use_frameworks!/use_modular_headers!
          # Ativamos frameworks estáticos SÓ no target Runner.
          target 'Runner' do
            use_frameworks! :linkage => :static
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            # Braintree
            pod 'Braintree/Core',          '~> 6.36'
            pod 'Braintree/Card',          '~> 6.36'
            pod 'Braintree/ThreeDSecure',  '~> 6.36'
            pod 'Braintree/DataCollector', '~> 6.36'
            pod 'Braintree/ApplePay',      '~> 6.36'

            # ===== Modular headers exigidos pelo validator =====
            pod 'SDWebImage',               :modular_headers => true

            pod 'FirebaseCore',             :modular_headers => true
            pod 'FirebaseCoreExtension',    :modular_headers => true
            pod 'FirebaseCoreInternal',     :modular_headers => true
            pod 'GoogleUtilities',          :modular_headers => true
            pod 'GoogleDataTransport',      :modular_headers => true
            pod 'FirebaseInstallations',    :modular_headers => true
            pod 'nanopb',                   :modular_headers => true

            pod 'FirebaseAuthInterop',      :modular_headers => true
            pod 'FirebaseAppCheckInterop',  :modular_headers => true
            pod 'FirebaseMessagingInterop', :modular_headers => true
            pod 'RecaptchaInterop',         :modular_headers => true

            pod 'FirebaseAuth',             :modular_headers => true
            pod 'FirebaseFirestore',        :modular_headers => true
            pod 'FirebaseFirestoreInternal',:modular_headers => true
            pod 'FirebaseFunctions',        :modular_headers => true
            pod 'FirebaseRemoteConfig',     :modular_headers => true
            pod 'FirebaseSessions',         :modular_headers => true
            pod 'FirebaseStorage',          :modular_headers => true
            pod 'FirebaseABTesting',        :modular_headers => true
          end

          # Extensão sem pods
          target 'ImageNotification' do
            inherit! :search_paths
          end

          post_install do |installer|
            # Ajustes de build p/ todos os targets
            installer.pods_project.targets.each do |t|
              t.build_configurations.each do |c|
                c.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                c.build_settings['CLANG_ENABLE_MODULES'] = 'YES'
                c.build_settings['SWIFT_VERSION'] = '5.0'
                c.build_settings['ENABLE_BITCODE'] = 'NO'
                # Garante path dos headers públicos dos Pods (resolve Flutter/Flutter.h)
                hs = c.build_settings['HEADER_SEARCH_PATHS'] || '$(inherited)'
                extra = ' "${PODS_ROOT}/Headers/Public" "${PODS_ROOT}/Headers/Public/Flutter"'
                unless hs.to_s.include?('Headers/Public/Flutter')
                  c.build_settings['HEADER_SEARCH_PATHS'] = hs.to_s + extra
                end
                # -ObjC para evitar símbolos faltando em categorias ObjC
                ld = c.build_settings['OTHER_LDFLAGS'] || '$(inherited)'
                unless ld.to_s.include?('-ObjC')
                  c.build_settings['OTHER_LDFLAGS'] = ld.to_s + ' -ObjC'
                end
                c.build_settings.delete('ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES')
              end
            end
            # SWIFT_VERSION também no projeto do Runner
            installer.aggregate_targets.each do |agg|
              agg.user_project.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
              end
            end
          end
          PODFILE

      - name: Patch xcconfigs do Flutter para herdar Pods
        script: |
          set -euo pipefail
          mkdir -p ios/Flutter
          for mode in Debug Profile Release; do
            f="ios/Flutter/${mode}.xcconfig"; test -f "$f" || touch "$f"
          done
          prepend_once () {
            local file="$1"; local line="$2"
            if grep -Fqx "$line" "$file"; then return 0; fi
            tmp="$(mktemp -t xcconf)"; printf '%s\n' "$line" > "$tmp"; cat "$file" >> "$tmp"; mv -f "$tmp" "$file"
          }
          prepend_once ios/Flutter/Debug.xcconfig   '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig"'
          prepend_once ios/Flutter/Profile.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"'
          prepend_once ios/Flutter/Release.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig"'
          for f in ios/Flutter/*.xcconfig; do echo "---- $f ----"; sed -n '1,3p' "$f" || true; done

      - name: CocoaPods install (limpo)
        script: |
          set -euo pipefail
          source $CM_ENV || true
          rm -rf ios/Pods ios/Podfile.lock ios/Runner.xcworkspace
          cd ios
          pod --version
          pod repo update
          pod install --verbose
          cd ..

      - name: Importar certificado no keychain (sem interação)
        script: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Certificates"
          echo "$IOS_DISTRIBUTION_CERT" | base64 -D > "$HOME/Library/MobileDevice/Certificates/dist.p12"
          KEYCHAIN_NAME="build.keychain"
          security create-keychain -p "" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "" "$KEYCHAIN_NAME"
          security import "$HOME/Library/MobileDevice/Certificates/dist.p12" \
            -k "$KEYCHAIN_NAME" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain
          security default-keychain -s "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_NAME"
          /usr/bin/security find-identity -v "$KEYCHAIN_NAME" || true

      - name: Criar/baixar perfis de provisionamento (App Store)
        script: |
          set -euo pipefail
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" \
            --type IOS_APP_STORE --create --verbose
          app-store-connect fetch-signing-files "$EXT_IMAGE_NOTIFICATION_BUNDLE_ID" \
            --type IOS_APP_STORE --create --verbose || true
          app-store-connect fetch-signing-files "$EXT_WIDGET_BUNDLE_ID" \
            --type IOS_APP_STORE --create --verbose || true

      - name: Aplicar perfis ao projeto
        script: |
          set -euo pipefail
          xcode-project use-profiles

      - name: Gerar ExportOptions.plist (App Store)
        script: |
          set -euo pipefail
          DEST="$CM_BUILD_DIR/export_options.plist"
          /usr/libexec/PlistBuddy -c "Clear dict" "$DEST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :method string app-store"            "$DEST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic"      "$DEST"
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true"        "$DEST"
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false"           "$DEST"
          /usr/libexec/PlistBuddy -c "Add :manageAppVersionAndBuildNumber bool false" "$DEST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict"          "$DEST"

          # App
          APP_PROFILE_NAME=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null \
            | xargs -I{} /usr/bin/security cms -D -i {} 2>/dev/null \
            | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin 2>/dev/null \
            | grep -m1 "$APP_BUNDLE_ID" -B1 | head -n1 || true)
          if [ -n "$APP_PROFILE_NAME" ]; then
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$APP_BUNDLE_ID string $APP_PROFILE_NAME" "$DEST"
          fi

          # Extensões (se houver perfil correspondente)
          for BID in "$EXT_IMAGE_NOTIFICATION_BUNDLE_ID" "$EXT_WIDGET_BUNDLE_ID"; do
            [ -n "$BID" ] || continue
            PNAME=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null \
              | xargs -I{} /usr/bin/security cms -D -i {} 2>/dev/null \
              | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin 2>/dev/null \
              | grep -m1 "$BID" -B1 | head -n1 || true)
            if [ -n "$PNAME" ]; then
              /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BID string $PNAME" "$DEST"
            fi
          done

          echo "=== ExportOptions.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$DEST" || (echo "Falha ao gerar ExportOptions.plist" && exit 1)

      - name: Build IPA assinado (Release)
        script: |
          set -euo pipefail
          mkdir -p build_logs
          echo "export FLUTTER_BUILD_NUMBER=$(date +%s)" >> $CM_ENV
          source $CM_ENV
          set +e
          flutter build ipa --release \
            --build-number="$FLUTTER_BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/export_options.plist" -v \
            | tee build_logs/flutter_build_verbose.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Diagnóstico pós-build (pegar o erro real)
        script: |
          set -euo pipefail
          echo "==== Procurando erros no log do Flutter ===="
          if [ -f build_logs/flutter_build_verbose.log ]; then
            lnnum=$(grep -nE "error:|Swift Compiler Error|fatal error" build_logs/flutter_build_verbose.log | head -n 1 | cut -d: -f1 || true)
            if [ -n "$lnnum" ]; then
              echo "--- Contexto do flutter_build_verbose.log (±80 linhas) ---"
              start=$((lnnum-80)); [ $start -lt 1 ] && start=1
              end=$((lnnum+80))
              sed -n "${start},${end}p" build_logs/flutter_build_verbose.log || true
            else
              echo "Nenhum 'error:' encontrado no flutter_build_verbose.log"
            fi
          else
            echo "Log build_logs/flutter_build_verbose.log não encontrado."
          fi

          echo "==== Vasculhando activity logs do Xcode ===="
          ACTLOGS=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type f -name "*.xcactivitylog" 2>/dev/null | tail -n 5)
          if [ -n "$ACTLOGS" ]; then
            for f in $ACTLOGS; do
              echo "--- Arquivo: $f ---"
              line=$(strings "$f" | grep -nE "error:|Swift Compiler Error|fatal error" | head -n 1 | cut -d: -f1 || true)
              if [ -n "$line" ]; then
                echo "Contexto (±80):"
                start=$((line-80)); [ $start -lt 1 ] && start=1
                end=$((line+80))
                strings "$f" | sed -n "${start},${end}p" || true
              else
                echo "Sem 'error:' neste activity log."
              fi
            done
          else
            echo "Nenhum .xcactivitylog encontrado."
          fi

      - name: Upload para App Store Connect (TestFlight)
        script: |
          set -euo pipefail
          IPA_PATH=$(ls -1 build/ios/ipa/*.ipa | head -n1)
          test -f "$IPA_PATH" || (echo "IPA não encontrado!" && exit 1)

          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Falta APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Falta APP_STORE_CONNECT_ISSUER_ID (Issuer ID)}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Falta APP_STORE_CONNECT_PRIVATE_KEY (.p8 ou base64)}"

          mkdir -p ~/.private_keys
          KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"

          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | head -c 50 | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_"${KEY_ID}".p8
          else
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > ~/.private_keys/AuthKey_"${KEY_ID}".p8
          fi
          chmod 600 ~/.private_keys/AuthKey_"${KEY_ID}".p8
          ls -l ~/.private_keys/ || true

          xcrun altool --upload-app \
            --type ios \
            -f "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

          echo "Upload disparado: $IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
      - build_logs/flutter_build_verbose.log
