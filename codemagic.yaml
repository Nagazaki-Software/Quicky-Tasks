workflows:
  ios-release:
    name: iOS Release (App Store Connect)
    environment:
      flutter: stable
      xcode: 16.2
      vars:
        APP_BUNDLE_ID: com.nagazakisoftware.quick
        EXT_IMAGE_NOTIFICATION_BUNDLE_ID: com.nagazakisoftware.quick.ImageNotification
        EXT_WIDGET_BUNDLE_ID: com.nagazakisoftware.quick.Quicky-Widget
      groups:
        - appstore_credentials
        - ios_signing_files

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
        - ~/.gem
        - ios/Pods

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version
          xcodebuild -version
          which ruby || true; ruby -v || true
          which pod  || true; pod --version || true
          xcrun swift -version || true

      - name: Flutter clean, precache & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter precache --ios
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Criar SwiftDummy.swift no Runner (ativa pipeline Swift)
        script: |
          set -euo pipefail
          mkdir -p ios/Runner
          printf 'import Foundation\n@objc class SwiftDummy: NSObject {}\n' > ios/Runner/SwiftDummy.swift
          echo "SwiftDummy.swift gravado"

      - name: Escrever/Atualizar Podfile (frameworks estáticos, Swift 5)
        script: |
          set -euo pipefail
          mkdir -p ios
          cat > ios/Podfile <<'PODFILE'
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          # ✅ Ajuda com Xcode 15/16 + plugins
          use_frameworks! :linkage => :static

          install! 'cocoapods',
            :warn_for_unused_master_specs_repo => false,
            :generate_multiple_pod_projects => false,
            :integrate_targets => true

          project 'Runner', { 'Debug' => :debug, 'Profile' => :release, 'Release' => :release }

          def flutter_root
            generated_xcconfig = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            raise "Generated.xcconfig não encontrado. Rode `flutter pub get`." unless File.exist?(generated_xcconfig)
            File.foreach(generated_xcconfig) do |line|
              m = line.match(/FLUTTER_ROOT\=(.*)/); return m[1].strip if m
            end
            raise "FLUTTER_ROOT não encontrado no Generated.xcconfig."
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))
          flutter_ios_podfile_setup

          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            # Braintree (se já vier via plugin, remova)
            pod 'Braintree/Core',          '~> 6.36'
            pod 'Braintree/Card',          '~> 6.36'
            pod 'Braintree/ThreeDSecure',  '~> 6.36'
            pod 'Braintree/DataCollector', '~> 6.36'
            pod 'Braintree/ApplePay',      '~> 6.36'
          end

          target 'ImageNotification' do
            inherit! :search_paths
          end

          post_install do |installer|
            projects = [installer.pods_project]
            installer.aggregate_targets.each { |agg| projects << agg.user_project }
            projects.uniq.each do |proj|
              proj.targets.each do |t|
                t.build_configurations.each do |c|
                  bs = c.build_settings

                  bs['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                  bs['SWIFT_VERSION'] = '5.0'
                  bs['EXPLICIT_MODULES'] = 'NO'
                  bs['CLANG_ENABLE_MODULES'] = 'YES'
                  bs['DEFINES_MODULE'] = 'YES'
                  bs['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                  bs['CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE'] = 'NO'
                  bs['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                  bs['ENABLE_BITCODE'] = 'NO'
                  bs['USE_HEADERMAP'] = 'YES'
                  bs['CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER'] = 'NO'

                  # 🔎 Caminhos do Flutter p/ TODOS os pods (ex.: wakelock_plus)
                  bs['HEADER_SEARCH_PATHS'] = [
                    '$(inherited)',
                    '$(PODS_ROOT)/Headers/Public',
                    '$(PODS_ROOT)/Headers/Public/**',
                    '$(SRCROOT)/Flutter',
                    '$(PROJECT_DIR)/Flutter',
                    '$(PODS_CONFIGURATION_BUILD_DIR)/Flutter/Flutter.framework/Headers',
                    '${FLUTTER_ROOT}/bin/cache/artifacts/engine/ios/Flutter.xcframework/ios-arm64/Headers',
                    '${FLUTTER_ROOT}/bin/cache/artifacts/engine/ios-release/Flutter.xcframework/ios-arm64/Headers'
                  ].join(' ')

                  bs['FRAMEWORK_SEARCH_PATHS'] = [
                    '$(inherited)',
                    '$(PODS_ROOT)',
                    '$(PODS_ROOT)/Flutter',
                    '$(SRCROOT)/Flutter',
                    '${FLUTTER_ROOT}/bin/cache/artifacts/engine/ios',
                    '${FLUTTER_ROOT}/bin/cache/artifacts/engine/ios-release'
                  ].join(' ')

                  if t.name == 'ImageNotification'
                    bs['APPLICATION_EXTENSION_API_ONLY'] = 'YES'
                  end
                end
              end
            end
          end
          PODFILE

      - name: Patch xcconfigs do Flutter para herdar Pods
        script: |
          set -euo pipefail
          mkdir -p ios/Flutter
          for mode in Debug Profile Release; do
            f="ios/Flutter/${mode}.xcconfig"; test -f "$f" || touch "$f"
          done
          prepend_once () {
            local file="$1"; local line="$2"
            if ! grep -Fqx "$line" "$file"; then
              tmp="$(mktemp -t xcconf)"; printf '%s\n' "$line" > "$tmp"; cat "$file" >> "$tmp"; mv -f "$tmp" "$file"
            fi
          }
          prepend_once ios/Flutter/Debug.xcconfig   '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig"'
          prepend_once ios/Flutter/Profile.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"'
          prepend_once ios/Flutter/Release.xcconfig '#include "Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig"'
          for f in ios/Flutter/*.xcconfig; do echo "---- $f ----"; head -n 3 "$f" || true; done

      - name: CocoaPods install (limpo)
        script: |
          set -euo pipefail
          rm -rf ios/Pods ios/Podfile.lock ios/Runner.xcworkspace ~/Library/Developer/Xcode/DerivedData/*
          # 💊 ajuda muito no CI
          rm -f ios/Flutter/Flutter.podspec
          cd ios
          pod repo update
          pod install --verbose
          cd ..

      - name: Patch imports de Flutter nos plugins (Objective-C)
        script: |
          set -euo pipefail
          # Troca '#import <Flutter/Flutter.h>' ou com aspas -> '@import Flutter;'
          patch_file() {
            local F="$1"
            if grep -qE '#import[[:space:]]*<Flutter/Flutter\.h>|#import[[:space:]]*"Flutter/Flutter\.h"' "$F"; then
              sed -i '' -E 's/#import[[:space:]]*<Flutter\/Flutter\.h>/@import Flutter;/' "$F"
              sed -i '' -E 's/#import[[:space:]]*"Flutter\/Flutter\.h"/@import Flutter;/' "$F"
              echo "Patchei import em: $F"
            fi
          }
          # Plugins via symlink
          find ios/.symlinks/plugins -type f -name '*.h' -print0 2>/dev/null | while IFS= read -r -d '' F; do patch_file "$F"; done
          # Fallback no cache do pub (ex.: wakelock_plus)
          find "$HOME/.pub-cache" -type f -path "*ios*" -name '*.h' -print0 2>/dev/null | while IFS= read -r -d '' F; do patch_file "$F"; done

      # ----------- ASSINATURA E PERFIS (ANTES DO BUILD!) -----------
      - name: Importar certificado no keychain (sem interação)
        script: |
          set -euo pipefail
          : "${IOS_DISTRIBUTION_CERT:?Falta IOS_DISTRIBUTION_CERT (p12 base64)}"
          : "${CERTIFICATE_PASSWORD:?Falta CERTIFICATE_PASSWORD}"
          KEYCHAIN_NAME="build.keychain"
          mkdir -p "$HOME/Library/MobileDevice/Certificates"
          echo "$IOS_DISTRIBUTION_CERT" | base64 -D > "$HOME/Library/MobileDevice/Certificates/dist.p12"
          security create-keychain -p "" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "" "$KEYCHAIN_NAME"
          security import "$HOME/Library/MobileDevice/Certificates/dist.p12" \
            -k "$KEYCHAIN_NAME" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain
          security default-keychain -s "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_NAME"
          /usr/bin/security find-identity -v "$KEYCHAIN_NAME" || true

      - name: Criar/baixar perfis de provisionamento (App Store)
        script: |
          set -euo pipefail
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" --type IOS_APP_STORE --create --verbose
          app-store-connect fetch-signing-files "$EXT_IMAGE_NOTIFICATION_BUNDLE_ID" --type IOS_APP_STORE --create --verbose || true
          app-store-connect fetch-signing-files "$EXT_WIDGET_BUNDLE_ID" --type IOS_APP_STORE --create --verbose || true

      - name: Aplicar perfis ao projeto
        script: |
          set -euo pipefail
          xcode-project use-profiles

      - name: Gerar ExportOptions.plist (App Store)
        script: |
          set -euo pipefail
          DEST="$CM_BUILD_DIR/export_options.plist"
          /usr/libexec/PlistBuddy -c "Clear dict" "$DEST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :method string app-store"            "$DEST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic"      "$DEST"
          /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true"        "$DEST"
          /usr/libexec/PlistBuddy -c "Add :uploadBitcode bool false"           "$DEST"
          /usr/libexec/PlistBuddy -c "Add :manageAppVersionAndBuildNumber bool false" "$DEST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict"          "$DEST"
          get_profile_name () {
            ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null \
              | xargs -I{} /usr/bin/security cms -D -i {} 2>/dev/null \
              | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin 2>/dev/null \
              | grep -m1 "$1" -B1 | head -n1 || true
          }
          P=$(get_profile_name "$APP_BUNDLE_ID"); [ -n "$P" ] && /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$APP_BUNDLE_ID string $P" "$DEST"
          for BID in "$EXT_IMAGE_NOTIFICATION_BUNDLE_ID" "$EXT_WIDGET_BUNDLE_ID"; do
            [ -n "$BID" ] || continue
            P=$(get_profile_name "$BID"); [ -n "$P" ] && /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BID string $P" "$DEST"
          done
          echo "=== ExportOptions.plist ==="; /usr/libexec/PlistBuddy -c "Print" "$DEST" || (echo "Falha ao gerar ExportOptions.plist" && exit 1)
      # --------------------------------------------------------------

      - name: Build IPA assinado (Release)
        script: |
          set -euo pipefail
          mkdir -p build_logs
          echo "export FLUTTER_BUILD_NUMBER=$(date +%s)" >> $CM_ENV
          source $CM_ENV
          export NSUnbufferedIO=YES
          set +e
          flutter build ipa --release \
            --build-number="$FLUTTER_BUILD_NUMBER" \
            --export-options-plist="$CM_BUILD_DIR/export_options.plist" -v \
            | tee build_logs/flutter_build_verbose.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Diagnóstico pós-build (Swift/Clang)
        script: |
          set -euo pipefail
          echo "----- PRIMEIRA linha com error/fatal -----"
          grep -m1 -niE "error:|fatal error:" build_logs/flutter_build_verbose.log || true
          echo "----- 200 linhas ao redor -----"
          awk '
            /error:|fatal error:/ {for(i=NR-60;i<=NR+140;i++){if(i>0) print a[i%400]; exit 0}
            {a[NR%400]=$0}
          ' build_logs/flutter_build_verbose.log || true

      - name: Upload para App Store Connect (TestFlight)
        script: |
          set -euo pipefail
          IPA_PATH=$(ls -1 build/ios/ipa/*.ipa | head -n1)
          test -f "$IPA_PATH" || (echo "IPA não encontrado!" && exit 1)
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Falta APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Falta APP_STORE_CONNECT_ISSUER_ID (Issuer ID)}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Falta APP_STORE_CONNECT_PRIVATE_KEY (.p8 ou base64)}"
          mkdir -p ~/.private_keys
          KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | head -c 50 | grep -q "BEGIN"; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_"${KEY_ID}".p8
          else
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > ~/.private_keys/AuthKey_"${KEY_ID}".p8
          fi
          chmod 600 ~/.private_keys/AuthKey_"${KEY_ID}".p8
          app-store-connect publish --path "$IPA_PATH" --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" --issuerId "$APP_STORE_CONNECT_ISSUER_ID" --privateKeyPath ~/.private_keys/AuthKey_"${KEY_ID}".p8 --verbose
          echo "Upload disparado: $IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
      - build_logs/*.log
