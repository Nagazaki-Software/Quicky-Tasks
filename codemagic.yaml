workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment: { flutter: stable, xcode: latest }
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          ruby -v || true; pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean && flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Patch braintree_native_ui.podspec (pub-cache)
        script: |
          set -euo pipefail
          PIN_VER="5.31.0"
          SPEC=$(ls -1 ~/.pub-cache/hosted/pub.dev/braintree_native_ui-*/ios/braintree_native_ui.podspec 2>/dev/null | head -n1)
          test -f "$SPEC" || { echo "Podspec não encontrado no pub-cache"; ls -la ~/.pub-cache/hosted/pub.dev/ | sed -n '1,200p'; exit 1; }
          echo "Antes:"; grep -n "Braintree" "$SPEC" || true
          ruby - "$SPEC" "$PIN_VER" <<'RB'
            p  = ARGV[0]; v = ARGV[1]; t = File.read(p)
            t = t.gsub(/s\.dependency\s+['"]Braintree['"]\s*,\s*['"]~>[^'"]+['"]/, "s.dependency 'Braintree', '#{v}'")
            t = t.gsub(/s\.dependency\s+['"]Braintree['"]\b(?!\s*,)/,          "s.dependency 'Braintree', '#{v}'")
            File.write(p, t)
          RB
          echo "Depois:"; grep -n "Braintree" "$SPEC" || true

      - name: Patch Podfile (use_frameworks! + Braintree 5.31.0)
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"
          # CDN + plataforma
          grep -q "^source 'https://cdn.cocoapods.org/'" "$PODFILE" || sed -i.bak "1isource 'https://cdn.cocoapods.org/'" "$PODFILE"
          if grep -q "^platform :ios" "$PODFILE"; then
            sed -i.bak "s/^platform :ios.*/platform :ios, '15.0'/" "$PODFILE"
          else
            awk 'NR==1{print; print "platform :ios, '\''15.0'\''"; next}{print}' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          fi
          # use_frameworks! dentro do Runner
          awk '
            /target[[:space:]]+'\''Runner'\''[[:space:]]+do/ {print; print "  use_frameworks!"; next}
            {print}
          ' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          # Remover entradas antigas e injetar umbrella + subspecs
          sed -i.bak "/pod 'Braintree[^']*'/d" "$PODFILE"
          awk '
            /target[[:space:]]+'\''Runner'\''[[:space:]]+do/ {inrunner=1}
            inrunner && /flutter_install_all_ios_pods/ && !printed {
              print "  pod '\''Braintree'\'', '\''5.31.0'\''"
              print "  pod '\''Braintree/Card'\''"
              print "  pod '\''Braintree/ThreeDSecure'\''"
              print "  pod '\''Braintree/DataCollector'\''"
              printed=1
            }
            {print}
          ' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          echo "== Podfile final ==" && cat "$PODFILE"

      - name: Install CocoaPods
        script: |
          set -euo pipefail
          gem list -i cocoapods || gem install cocoapods -N --user-install
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"; export PATH="$GEM_BIN:$PATH"
          cd ios
          rm -f Podfile.lock && rm -rf Pods
          pod repo update
          pod install --repo-update || (echo "retry pod install..." && sleep 5 && pod install --repo-update)
          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
