workflows:
  ios-release:
    name: iOS Release (no codesign)
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ios/Podfile.lock
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Versions
        script: |
          set -euo pipefail
          flutter --version && xcodebuild -version
          ruby -v || true; pod --version || true

      - name: Flutter clean & pub get
        script: |
          set -euo pipefail
          flutter clean
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig não foi criado!" && exit 1)

      - name: Escrever Podfile (robusto, SEM use_frameworks!, COM use_modular_headers!)
        script: |
          set -euo pipefail
          cat > ios/Podfile <<'PODFILE'
          # Podfile para Flutter + Braintree (CocoaPods)
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          # 🔑 Gera module maps para pods sem módulos (GoogleUtilities, SDWebImage, etc.)
          use_modular_headers!

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          # Descobre o FLUTTER_ROOT de forma robusta
          def flutter_root
            generated_xcconfig = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            if File.exist?(generated_xcconfig)
              File.foreach(generated_xcconfig) do |line|
                m = line.match(/FLUTTER_ROOT\=(.*)/)
                return m[1].strip if m
              end
            end
            if ENV['FLUTTER_ROOT'] && !ENV['FLUTTER_ROOT'].empty? && File.directory?(ENV['FLUTTER_ROOT'])
              return ENV['FLUTTER_ROOT']
            end
            system('bash', '-lc', 'cd .. && flutter pub get 1>/dev/null 2>&1')
            if File.exist?(generated_xcconfig)
              File.foreach(generated_xcconfig) do |line|
                m = line.match(/FLUTTER_ROOT\=(.*)/)
                return m[1].strip if m
              end
            end
            raise "Generated.xcconfig não encontrado e ENV['FLUTTER_ROOT'] não definida. Rode `flutter pub get` na raiz do projeto."
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper.rb'))
          flutter_ios_podfile_setup

          target 'Runner' do
            # ⚠️ SEM use_frameworks!: plugins Flutter preferem libs estáticas

            # Garante o pod Flutter presente (engine/headers)
            pod 'Flutter', :path => 'Flutter'

            # Plugins do Flutter
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            # Braintree 6.x via CocoaPods
            pod 'Braintree',               '~> 6.36'
            pod 'Braintree/Card',          '~> 6.36'
            pod 'Braintree/ThreeDSecure',  '~> 6.36'
            pod 'Braintree/DataCollector', '~> 6.36'

            # (Opcional) modularização pontual se algo reclamar:
            # pod 'SDWebImage', :modular_headers => true
          end

          # ===== Wrapper seguro para diferenças do helper do Flutter =====
          def _call_flutter_build_settings_safely(installer)
            return unless self.respond_to?(:flutter_additional_ios_build_settings)
            arity = -1
            begin
              arity = method(:flutter_additional_ios_build_settings).arity
            rescue
            end
            if arity == 1
              installer.pods_project.targets.each do |t|
                begin
                  flutter_additional_ios_build_settings(t)
                rescue NoMethodError, ArgumentError
                end
              end
              return
            end
            if arity == 0
              begin
                flutter_additional_ios_build_settings
                return
              rescue NoMethodError, ArgumentError
              end
            end
            begin
              flutter_additional_ios_build_settings(installer)
            rescue NoMethodError, ArgumentError
            end
          end
          # =============================================================

          post_install do |installer|
            require 'fileutils'

            # Usa o wrapper (não chama o helper direto)
            _call_flutter_build_settings_safely(installer)

            # 🔧 Symlink de Flutter.h em Headers/Public/Flutter/Flutter.h
            # (é onde os plugins fazem #include <Flutter/Flutter.h>)
            flutter_headers_candidates = Dir.glob([
              File.join(installer.sandbox.root.to_s, 'Flutter', 'Flutter.framework', 'Headers'),
              File.join(installer.sandbox.root.to_s, 'Flutter', 'Flutter.xcframework', '**', 'Headers')
            ])
            flutter_headers_dir = flutter_headers_candidates.find { |p| File.directory?(p) }
            if flutter_headers_dir
              public_flutter_dir = File.join(installer.sandbox.public_headers.root.to_s, 'Flutter')
              FileUtils.mkdir_p(public_flutter_dir)
              src = File.join(flutter_headers_dir, 'Flutter.h')
              dst = File.join(public_flutter_dir, 'Flutter.h')
              FileUtils.ln_sf(src, dst) if File.exist?(src)
            end

            # Garante iOS mínimo, Swift 5 e caminhos de headers/frameworks do Flutter
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['SWIFT_VERSION'] = '5.0'

                # Headers (para includes <>)
                existing_h = config.build_settings['HEADER_SEARCH_PATHS'] || '$(inherited)'
                extra_h = [
                  '$(PODS_ROOT)/Headers/Public',
                  '$(PODS_ROOT)/Headers/Public/Flutter',
                  '$(PODS_ROOT)/Flutter/Flutter.framework/Headers',
                  '$(PODS_ROOT)/Flutter/Flutter.xcframework/**/Headers',
                  '$(PODS_CONFIGURATION_BUILD_DIR)/Flutter/Flutter.framework/Headers'
                ]
                config.build_settings['HEADER_SEARCH_PATHS'] = Array(existing_h) + extra_h

                # Frameworks (para localizar Flutter.framework/xcframework)
                existing_f = config.build_settings['FRAMEWORK_SEARCH_PATHS'] || '$(inherited)'
                extra_f = [
                  '$(PODS_ROOT)/Flutter',
                  '$(PODS_CONFIGURATION_BUILD_DIR)/Flutter',
                  '$(PODS_XCFRAMEWORKS_BUILD_DIR)/Flutter'
                ]
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = Array(existing_f) + extra_f

                config.build_settings['CLANG_ENABLE_MODULES'] = 'YES'
              end
            end
          end
          PODFILE

          echo "== Podfile final (1..260) =="
          nl -ba ios/Podfile | sed -n '1,260p'

      - name: Install CocoaPods
        script: |
          set -euo pipefail

          # Garante o Generated.xcconfig
          flutter pub get
          test -f ios/Flutter/Generated.xcconfig || (echo "Generated.xcconfig ainda não existe!"; exit 1)

          # CocoaPods estável (1.15.2)
          gem uninstall cocoapods -aIx || true
          gem install cocoapods -v 1.15.2 -N --user-install

          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"

          echo "CocoaPods version:"
          pod --version

          cd ios
          rm -f Podfile.lock
          rm -rf Pods
          pod _1.15.2_ repo update
          pod _1.15.2_ deintegrate || true
          pod _1.15.2_ install --repo-update

          # debug opcional: confirma headers/framework do Flutter
          echo "== Debug Flutter pod =="
          ls -la Pods/Flutter || true
          find Pods/Flutter -maxdepth 4 -print || true
          grep -R "Flutter.h" Pods -n || true
          cd ..

      - name: Build iOS (release, no codesign)
        script: |
          set -euo pipefail
          export GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          export PATH="$GEM_BIN:$PATH"
          flutter pub get
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/**/*.xcarchive
