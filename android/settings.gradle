pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        // (opcional) Flutter storage
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        // Cardinal tb pode aparecer no pluginManagement, mas o essencial é em dependencyResolutionManagement
        maven { url = uri("https://cardinalcommerceprod.jfrog.io/artifactory/android") }
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    id "com.google.gms.google-services" version "4.3.8" apply false  // Google Services plugin
    
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        // 👇 Repositório do Cardinal (necessário para 3DS da Braintree)
        maven { url = uri("https://cardinalcommerceprod.jfrog.io/artifactory/android") }
        // (opcional) jitpack se você usa libs de lá
        maven { url = uri("https://jitpack.io") }
    }
}

rootProject.name = "android"
include(":app")
