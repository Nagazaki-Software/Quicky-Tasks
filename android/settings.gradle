// android/settings.gradle

pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    // Integra o build do Flutter
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS) // ou FAIL_ON_PROJECT_REPOS (ver nota abaixo)
    repositories {
        google()
        mavenCentral()
        maven { url "https://storage.googleapis.com/download.flutter.io" }

        // ✅ JitPack — necessário para com.github.Tap-Payments:TapGooglePayKit
        maven { url "https://jitpack.io" }

        // ✅ Cardinal Commerce — necessário para cardinalmobilesdk
        maven { url "https://maven.cardinalcommerce.com" }

        // ✅ Seu repo interno (troque para https se existir; senão mantenha http + allowInsecureProtocol)
        maven {
            url "http://maven.wdepos.com/repository/maven-public"
            allowInsecureProtocol true
            // Se exigir login, descomente e defina em ~/.gradle/gradle.properties:
            // credentials {
            //   username = findProperty("WDEPOS_USER") ?: ""
            //   password = findProperty("WDEPOS_PASS") ?: ""
            // }
        }
    }
}

include ":app"
