pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        def cardinalUsername = System.getenv("CARDINAL_USERNAME")
        def cardinalPassword = System.getenv("CARDINAL_PASSWORD")
        maven {
            url = uri("https://cardinalcommerceprod.jfrog.io/artifactory/android")
            if (cardinalUsername && cardinalPassword) {
                credentials {
                    username = cardinalUsername
                    password = cardinalPassword
                }
            }
        }
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    // Atualizado (opcional). Se quebrar dependências Firebase, volte para 4.3.8
    id "com.google.gms.google-services" version "4.4.2" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        def cardinalUsername = System.getenv("CARDINAL_USERNAME")
        def cardinalPassword = System.getenv("CARDINAL_PASSWORD")
        maven {
            url = uri("https://cardinalcommerceprod.jfrog.io/artifactory/android")
            if (cardinalUsername && cardinalPassword) {
                credentials {
                    username = cardinalUsername
                    password = cardinalPassword
                }
            }
        }
        maven { url = uri("https://jitpack.io") }
    }
}

rootProject.name = "QuickyTasks" // personalize
include(":app")
